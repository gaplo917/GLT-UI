name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build static docs (GitHub Pages base path)
        env:
          # Project site: https://<owner>.github.io/<repo>/
          BASE_PATH: /${{ github.event.repository.name }}
          NEXT_TELEMETRY_DISABLED: "1"
          CI: "true"
        # Full lockfile must list optional native packages (lightningcss-*) for Linux CI
        run: npm run build:ui && npx next build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
