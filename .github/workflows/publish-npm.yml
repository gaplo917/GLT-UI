name: Publish glt-ui to npm

on:
  push:
    tags:
      - "glt-ui-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (pack only, do not publish)"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/glt-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install (workspace root)
        working-directory: .
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack / publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            npm pack
          else
            npm publish --access public
          fi
