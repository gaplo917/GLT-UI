# Publishes glt-ui (repo root) via npm Trusted Publishing (OIDC).
# Based on https://docs.npmjs.com/trusted-publishers/
#
# npmjs.com → glt-ui → Settings → Trusted Publisher → GitHub Actions:
#   Organization or user: gaplo917
#   Repository:           GLT-UI
#   Workflow filename:    publish-npm.yml
#   Environment name:     (empty)
#   Allowed actions:      npm publish

name: Publish glt-ui to npm

on:
  push:
    tags:
      - "glt-ui-v*"
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false # never use caching in release builds

      - run: npm ci

      - run: npm run build --if-present

      - run: npm publish --provenance
