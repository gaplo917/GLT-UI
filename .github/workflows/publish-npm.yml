# Publishes packages/glt-ui via npm Trusted Publishing (OIDC).
# No long-lived NPM_TOKEN secret required.
#
# One-time on npmjs.com → package glt-ui → Settings → Trusted Publisher:
#   Organization or user: gaplo917
#   Repository:           GLT-UI   (exact case)
#   Workflow filename:    publish-npm.yml
#   Environment name:     (leave empty)
#   Allowed actions:      npm publish
#
# Requires npm CLI >= 11.5.1 for OIDC; Node 22 ships npm 10 → use Node 24
# or `npx npm@latest publish`. A failed OIDC handshake surfaces as E404.
#
# Docs: https://docs.npmjs.com/trusted-publishers/

name: Publish glt-ui to npm

on:
  push:
    tags:
      - "glt-ui-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (pack only, do not publish)"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # required for OIDC → npm

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/glt-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          # Node 24 ships a newer npm; OIDC still needs >= 11.5.1 (we upgrade below)
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Upgrade npm for Trusted Publishing (OIDC)
        working-directory: .
        run: |
          npm install -g npm@latest
          npm --version
          node --version

      - name: Install (workspace root)
        working-directory: .
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack / publish
        run: |
          set -euo pipefail
          NPM_BIN="$(command -v npm)"
          echo "Using npm at ${NPM_BIN} ($("${NPM_BIN}" --version))"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            "${NPM_BIN}" pack
          else
            # Use latest npm explicitly so OIDC token exchange works
            npx --yes npm@latest publish --access public
          fi
